<section class="hero">
  <div class="hero-bg" aria-hidden="true"></div>
  <div class="container hero-inner">
    <h1 class="hero-title">Play With Friends</h1>
    <p class="hero-subtitle">
      A curated collection of the best games to play with friends —<br>
      web games, co-op adventures, party games and more.
    </p>

    <div class="hero-filters">
      <app-filter-bar
        [filters]="filters"
        (filtersChange)="onFiltersChange($event)"
      ></app-filter-bar>
      <button class="btn btn-primary search-btn" (click)="search()" type="button">
        Find Games
      </button>
    </div>

    <a class="btn btn-outline browse-btn" routerLink="/games">Browse all games</a>
  </div>
</section>
